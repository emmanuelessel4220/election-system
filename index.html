<!DOCTYPE html>
<html>
<head>
    <title>Mama Is The Reason Election System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="title">🗳 Mama Is The Reason Election System</div>

    <div class="content">

        <!-- LOGIN -->
        <div class="left" id="loginPanel">
            <div class="logo">🏛</div>
            <h3>Voter Login</h3>

            <input id="voterId" type="text" placeholder="Enter Voter ID">
            <input id="password" type="password" placeholder="Enter Password">

            <button onclick="login()">Login</button>
            <button onclick="adminLogin()">Admin</button>
        </div>

        <!-- DASHBOARD -->
        <div class="right" id="dashboard">

            <div class="nav-box">
                <h4>Positions</h4>
                <ul>
                    <li>President</li>
                    <li>PRO</li>
                    <li>General Secretary</li>
                    <li>Financial Secretary</li>
                    <li>Treasurer</li>
                </ul>
            </div>

            <div class="vote-box" id="voteBox"></div>

            <div class="vote-box" id="adminPanel" style="display:none;">
                <h3>📊 Live Results</h3>
                <div id="resultsBox"></div>
            </div>

        </div>

    </div>

</div>

<script>

/* VOTERS */
let validVoters = {};
let currentVoter = null;

for (let i = 1; i <= 53; i++) {
    let num = i.toString().padStart(4, "0");
    validVoters["ps/mec/22/" + num] = num;
}

/* LOGIN */
async function login() {

    let id = voterId.value.toLowerCase().trim();
    let pass = password.value.trim();

    if (!(id in validVoters)) {
        alert("Invalid Voter ID ❌");
        return;
    }

    if (pass !== validVoters[id]) {
        alert("Wrong password ❌");
        return;
    }

    try {
        const cleanId = id.replace(/\//g, "_");
        const snap = await get(ref(db, 'voters/' + cleanId));

        if (snap.exists()) {
            alert("❌ Already voted");
            return;
        }

        currentVoter = cleanId;

        loginPanel.style.display = "none";
        dashboard.style.display = "flex";

        showPresident();

    } catch {
        alert("Database error ❌");
    }
}

/* ADMIN */
function adminLogin() {
    let pass = prompt("Admin password");

    if (pass === "admin123") {
        loginPanel.style.display = "none";
        dashboard.style.display = "flex";
        voteBox.style.display = "none";
        adminPanel.style.display = "block";
        showResults();
    } else {
        alert("Wrong password ❌");
    }
}

/* FLOW */
function next(pos) {
    if (pos === "president") showPRO();
    else if (pos === "pro") showGS();
    else if (pos === "gs") showFS();
    else if (pos === "fs") showTreasurer();
    else finishVoting();
}

function finishVoting() {

    set(ref(db, 'voters/' + currentVoter), true);

    voteBox.innerHTML = "<h3>Thank you for voting 🗳</h3>";

    setTimeout(() => {
        loginPanel.style.display = "block";
        dashboard.style.display = "none";
        voteBox.style.display = "block";
        adminPanel.style.display = "none";

        voterId.value = "";
        password.value = "";

        currentVoter = null;

    }, 2000);
}

/* UI WITH IMAGES */
function showPresident() {
    voteBox.innerHTML = `
    <h3>President</h3>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/women/44.jpg">
        <span>Ama</span>
        <button onclick="vote('president','Ama')">Vote</button>
    </div>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/men/32.jpg">
        <span>Kofi</span>
        <button onclick="vote('president','Kofi')">Vote</button>
    </div>`;
}

function showPRO() {
    voteBox.innerHTML = `
    <h3>PRO</h3>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/men/45.jpg">
        <span>Kwame</span>
        <button onclick="vote('pro','Kwame')">Vote</button>
    </div>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/women/65.jpg">
        <span>Yaa</span>
        <button onclick="vote('pro','Yaa')">Vote</button>
    </div>`;
}

function showGS() {
    voteBox.innerHTML = `
    <h3>General Secretary</h3>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/men/50.jpg">
        <span>Kwaku</span>
        <button onclick="vote('gs','Kwaku')">Vote</button>
    </div>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/women/30.jpg">
        <span>Abena</span>
        <button onclick="vote('gs','Abena')">Vote</button>
    </div>`;
}

function showFS() {
    voteBox.innerHTML = `
    <h3>Financial Secretary</h3>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/men/60.jpg">
        <span>Kwabena</span>
        <button onclick="vote('fs','Kwabena')">Vote</button>
    </div>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/women/20.jpg">
        <span>Akua</span>
        <button onclick="vote('fs','Akua')">Vote</button>
    </div>`;
}

function showTreasurer() {
    voteBox.innerHTML = `
    <h3>Treasurer</h3>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/men/22.jpg">
        <span>Kwesi</span>
        <button onclick="vote('treasurer','Kwesi')">Finish</button>
    </div>

    <div class="candidate">
        <img src="https://randomuser.me/api/portraits/women/10.jpg">
        <span>Nana</span>
        <button onclick="vote('treasurer','Nana')">Finish</button>
    </div>`;
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, get, set, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyD-5zquVd326wP1atuvZPxCz7eFiQhl-I",
  authDomain: "election-system-cbde4.firebaseapp.com",
  databaseURL: "https://election-system-cbde4-default-rtdb.firebaseio.com",
  projectId: "election-system-cbde4",
  storageBucket: "election-system-cbde4.firebasestorage.app",
  messagingSenderId: "782261417100",
  appId: "1:782261417100:web:f3ad49407bf383c7a777a9"
});

const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.get = get;
window.set = set;
window.runTransaction = runTransaction;
window.onValue = onValue;

window.vote = (pos, name) => {
    runTransaction(ref(db, 'results/' + pos + '/' + name), v => (v || 0) + 1);
    next(pos);
};

window.showResults = () => {
    onValue(ref(db, 'results'), snap => {
        let data = snap.val() || {}, html = "";

        for (let p in data) {
            html += `<h4>${p.toUpperCase()}</h4>`;
            for (let c in data[p]) {
                let n = data[p][c];
                html += `${c}: ${n}
                <div class="bar"><div class="fill" style="width:${n * 20}px"></div></div>`;
            }
            html += "<br>";
        }

        resultsBox.innerHTML = html;
    });
};

</script>

</body>
</html>
