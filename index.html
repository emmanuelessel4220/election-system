<!DOCTYPE html>
<html>
<head>
    <title>Mama Is The Reason Election System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="title">🗳 Mama Is The Reason Election System</div>

    <div class="content">

        <!-- LOGIN -->
        <div class="left" id="loginPanel">
            <div class="logo">🏛</div>
            <h3>Voter Login</h3>

            <input id="voterId" type="text" placeholder="Enter Name (mama)">
            <input id="password" type="password" placeholder="Enter Password">

            <button onclick="login()">Login</button>
            <button onclick="adminLogin()">Admin</button>
        </div>

        <!-- DASHBOARD -->
        <div class="right" id="dashboard" style="display:none;">

            <div class="nav-box">
                <h4>Positions</h4>
                <ul>
                    <li>President</li>
                    <li>PRO</li>
                    <li>General Secretary</li>
                    <li>Financial Secretary</li>
                    <li>Treasurer</li>
                </ul>
            </div>

            <div class="vote-box" id="voteBox"></div>

            <div class="vote-box" id="adminPanel" style="display:none;">
                <h3>📊 Live Results</h3>
                <div id="resultsBox"></div>
            </div>

        </div>

    </div>

</div>

<script>

/* =========================
   24H STORAGE SYSTEM
========================= */
const EXPIRY_TIME = 24 * 60 * 60 * 1000;

function saveData(key, data) {
    localStorage.setItem(key, JSON.stringify({
        data: data,
        time: Date.now()
    }));
}

function loadData(key, defaultValue) {
    let item = localStorage.getItem(key);
    if (!item) return defaultValue;

    item = JSON.parse(item);

    if (Date.now() - item.time > EXPIRY_TIME) {
        localStorage.removeItem(key);
        return defaultValue;
    }

    return item.data;
}

/* =========================
   VOTERS
========================= */
let voterPasswords = [];
for (let i = 0; i < 100; i++) {
    voterPasswords.push(1230 + i);
}

/* =========================
   LOAD DATA
========================= */
let usedPasswords = loadData("usedPasswords", []);

let results = loadData("results", {
    president: { Ama: 0, Kofi: 0 },
    pro: { Kwame: 0, Yaa: 0 },
    gs: { Kwaku: 0, Abena: 0 },
    fs: { Kwabena: 0, Akua: 0 },
    treasurer: { Kwesi: 0, Nana: 0 }
});

let currentPassword = null;

/* =========================
   LOGIN
========================= */
function login(){

    let id = document.getElementById("voterId").value.toLowerCase();
    let pass = document.getElementById("password").value;

    if(id !== "mama") return alert("Invalid name ❌");

    if(!voterPasswords.includes(Number(pass)))
        return alert("Invalid password ❌");

    if(usedPasswords.includes(Number(pass)))
        return alert("Already used ❌");

    currentPassword = Number(pass);

    loginPanel.style.display="none";
    dashboard.style.display="flex";

    showPresident();
}

/* =========================
   ADMIN LOGIN
========================= */
function adminLogin(){
    let pass = prompt("Admin password");

    if(pass==="admin123"){
        loginPanel.style.display="none";
        dashboard.style.display="flex";
        voteBox.style.display="none";
        adminPanel.style.display="block";

        setInterval(showResults,1000);
    } else {
        alert("Wrong password ❌");
    }
}

/* =========================
   VOTING
========================= */
function vote(pos,name){
    results[pos][name]++;

    // save results
    saveData("results", results);

    next(pos);
}

function next(pos){
    if(pos==="president") showPRO();
    else if(pos==="pro") showGS();
    else if(pos==="gs") showFS();
    else if(pos==="fs") showTreasurer();
    else finishVoting();
}

/* =========================
   FINISH
========================= */
function finishVoting(){

    usedPasswords.push(currentPassword);

    // save used passwords
    saveData("usedPasswords", usedPasswords);

    voteBox.innerHTML = "<h3>Thank you for voting 🗳</h3>";

    setTimeout(() => {

        loginPanel.style.display = "block";
        dashboard.style.display = "none";
        voteBox.style.display = "block";
        adminPanel.style.display = "none";

        document.getElementById("voterId").value = "";
        document.getElementById("password").value = "";

        currentPassword = null;

    }, 2000);
}

/* =========================
   UI
========================= */
function showPresident(){
    voteBox.innerHTML=`
    <h3>President</h3>
    <div class="candidate">👩🏽 Ama <button onclick="vote('president','Ama')">Vote</button></div>
    <div class="candidate">👨🏽 Kofi <button onclick="vote('president','Kofi')">Vote</button></div>`;
}

function showPRO(){
    voteBox.innerHTML=`
    <h3>PRO</h3>
    <div class="candidate">🧑🏽 Kwame <button onclick="vote('pro','Kwame')">Vote</button></div>
    <div class="candidate">👩🏽 Yaa <button onclick="vote('pro','Yaa')">Vote</button></div>`;
}

function showGS(){
    voteBox.innerHTML=`
    <h3>General Secretary</h3>
    <div class="candidate">🧑🏽 Kwaku <button onclick="vote('gs','Kwaku')">Vote</button></div>
    <div class="candidate">👩🏽 Abena <button onclick="vote('gs','Abena')">Vote</button></div>`;
}

function showFS(){
    voteBox.innerHTML=`
    <h3>Financial Secretary</h3>
    <div class="candidate">💼 Kwabena <button onclick="vote('fs','Kwabena')">Vote</button></div>
    <div class="candidate">📊 Akua <button onclick="vote('fs','Akua')">Vote</button></div>`;
}

function showTreasurer(){
    voteBox.innerHTML=`
    <h3>Treasurer</h3>
    <div class="candidate">💰 Kwesi <button onclick="vote('treasurer','Kwesi')">Finish</button></div>
    <div class="candidate">🪙 Nana <button onclick="vote('treasurer','Nana')">Finish</button></div>`;
}

/* =========================
   RESULTS + WINNER
========================= */
function getWinner(obj){
    return Object.entries(obj).sort((a,b)=>b[1]-a[1])[0][0];
}

function showResults(){

    let html="";

    for(let pos in results){

        html+=`<h4>${pos.toUpperCase()} (🏆 ${getWinner(results[pos])})</h4>`;

        for(let c in results[pos]){
            let count=results[pos][c];

            html+=`
            ${c}: ${count}
            <div class="bar">
                <div class="fill" style="width:${count*20}px"></div>
            </div>`;
        }

        html+="<br>";
    }

    resultsBox.innerHTML=html;
}

</script>

</body>
</html>
